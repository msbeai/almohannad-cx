<!doctype html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'TSD'; src: url('/fonts/thmanyahserifdisplay-Bold.woff2') format('woff2'); font-weight: 700; }
  @font-face { font-family: 'TS'; src: url('/fonts/thmanyahsans-Regular.woff2') format('woff2'); }
  * { margin: 0; box-sizing: border-box; }
  body { background: #888; }
  .og {
    position: fixed; top: 0; left: 0;
    width: 1200px; height: 630px;
    background: #1b1b1a; color: #f3f3f1;
    padding: 70px 80px;
    display: flex; flex-direction: column; justify-content: center;
    border-top: 4px solid #323230; border-bottom: 4px solid #323230;
  }
  .dot { width: 26px; height: 26px; border-radius: 50%; background: #a8a8a5; margin-bottom: 38px; }
  .name { font-family: 'TSD'; font-size: 72px; line-height: 1.2; }
  .domain { font-family: 'TSD'; font-size: 96px; direction: ltr; text-align: right; line-height: 1.25; }
  .domain span { color: #a8a8a5; }
  .sub { font-family: 'TS'; font-size: 36px; color: #9a9a97; margin-top: 30px; }
</style>
</head>
<body>
  <div class="og">
    <div class="dot"></div>
    <div class="name">المهند السبيعي</div>
    <div class="domain">almohannad<span>.cx</span></div>
    <div class="sub">تجربة العميل · الأبحاث التسويقية · الكتابة</div>
  </div>
</body>
</html>
